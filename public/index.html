            return c ? (c.parentId || null) : null;
        }


        function dedupeTransitiveEdges(rawEdges) {
            const edges = rawEdges.slice();
            const out = [];
            const bySource = new Map();
            for (const e of edges) {
                if (!bySource.has(e.source)) bySource.set(e.source, []);
                bySource.get(e.source).push(e);
            }
            const hasEdge = (a, b) => edges.some(e => e.source === a && e.target === b);
            const confVal = (e) => {
                const v = e && typeof e.confidence === 'number' && Number.isFinite(e.confidence) ? e.confidence : 0.55;
                return Math.max(0, Math.min(1, v));
            };
            for (const e of edges) {
                if (e.isEssential) {
                    out.push(e);
                    continue;
                }
                let transitive = false;
                const mids = (bySource.get(e.source) || []).map(x => x.target);
                for (const m of mids) {
                    if (m === e.target) continue;
                    if (hasEdge(m, e.target)) {
                        transitive = true;
                        const ab = edges.find(x => x.source === e.source && x.target === m);
                        const bc = edges.find(x => x.source === m && x.target === e.target);
                        const chainConf = Math.min(confVal(ab), confVal(bc));
                        const directConf = confVal(e);
                        if (directConf >= chainConf + 0.18) {
                            transitive = false;
                        }
                        break;
                    }
                }
                if (!transitive) out.push(e);
            }
            return out;
        }

        btnSmartConnectGlobal.addEventListener('click', async () => {
            if (!guardRequiresCoding()) return;
            if (isGeneratingRelations) return;
            const allCodes = Array.isArray(payload.codes) ? payload.codes.slice() : [];
            if (allCodes.length < 2) {
                showToast('当前编码数量不足，无法生成逻辑关联。');
                return;
            }
            isGeneratingRelations = true;
            setButtonLoading(btnSmartConnectGlobal, true);
            try {
                const nodesForModel = allCodes.map(c => ({
                    // 用 @@ 拼接确保唯一，防止同名概念被模型混淆
                    name: String(c.name || '').trim() + '@@' + String(c.id || '').trim(),
                    codeId: String(c.id || '').trim(),
                })).filter(n => n.name && n.codeId);
                const res = await fetch('/api/model-relations', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: interviewText.value || '',
                        nodes: nodesForModel,
                    }),
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
                const incomingEdges = [];
                const parseNodeName = (raw) => {
                    const text = String(raw || '').trim();
                    const idx = text.lastIndexOf('@@');
                    if (idx <= 0) return { display: text, codeId: '' };
                    return { display: text.slice(0, idx).trim(), codeId: text.slice(idx + 2).trim() };
                };
                for (const edge of (data.edges || [])) {
                    const s0 = parseNodeName(edge.source);
                    const t0 = parseNodeName(edge.target);
                    if (!s0.codeId || !t0.codeId) continue;
                    const relationType = String(edge.relationType || '').trim() || '关联';
                    const label =
                        String(edge.label || '').trim() ||
                        ('[' + s0.display + '] --' + relationType + '--> [' + t0.display + ']');
                    const confidenceRaw = Number(edge.confidence);
                    const confidence =
                        Number.isFinite(confidenceRaw)
                            ? Math.max(0, Math.min(1, confidenceRaw))
                            : null;
                    incomingEdges.push({
                        id: 'me_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
                        source: s0.codeId,
                        target: t0.codeId,
                        relationType,
                        label,
                        confidence,
                        isEssential: Boolean(edge.isEssential),
                    });
                }
                const dedupedIncoming = dedupeTransitiveEdges(incomingEdges);
                const byCodeId = new Map(allCodes.map(c => [String(c.id), c]));
                const usefulIds = new Set();
                for (const e of dedupedIncoming) {
                    usefulIds.add(e.source);
                    usefulIds.add(e.target);
                }
                const nodes = Array.from(usefulIds)
                    .map(id => byCodeId.get(id))
                    .filter(Boolean)
                    .map(c => ({
                        id: String(c.id),
                        name: String(c.name || '').trim(),
                        codeId: String(c.id),
                        level: Number(c.level) || null,
                    }));
                const links = dedupedIncoming.map(e => ({
                    source: e.source,
                    target: e.target,
                    relationType: e.relationType,
                    label: e.label,
                    confidence: e.confidence,
                    isEssential: e.isEssential,
                }));
                const subGraphData = { nodes, links };
                if (!subGraphData.links.length || !subGraphData.nodes.length) {
                    showToast('当前未识别到可用的逻辑关联关系。');
                    return;
                }
                openLogicModalWithGraph(subGraphData);
            } catch (err) {
                alert('自动建立逻辑关联失败：' + err.message);
            } finally {
                isGeneratingRelations = false;
                setButtonLoading(btnSmartConnectGlobal, false);
            }
        });

        function exportIndependentLogicChainsToPng(containerEl, pixelRatio) {
            const ratio = Number(pixelRatio) > 0 ? Number(pixelRatio) : 2;
            const rect = containerEl.getBoundingClientRect();
            const width = Math.max(10, Math.floor(rect.width));
            const height = Math.max(10, Math.floor(rect.height));
            const canvas = document.createElement('canvas');
            canvas.width = Math.floor(width * ratio);
            canvas.height = Math.floor(height * ratio);
            const ctx = canvas.getContext('2d');
            if (!ctx) return null;
            ctx.scale(ratio, ratio);

            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, width, height);

            const containerRect = rect;

            // Edges: read from DOM (stage-local SVG path) to keep multi-chain offsets correct
            ctx.strokeStyle = 'rgba(51, 65, 85, 0.95)';
            ctx.lineWidth = 2;
            const stages = Array.from(containerEl.querySelectorAll('.logic-chain-stage'));
            for (const stage of stages) {
                const stageRect = stage.getBoundingClientRect();
                const stageX = stageRect.left - containerRect.left;
                const stageY = stageRect.top - containerRect.top;
                const svg = stage.querySelector('svg.logic-chain-edges');
                if (!svg) continue;
                const paths = Array.from(svg.querySelectorAll('path'));
                ctx.save();
                ctx.translate(stageX, stageY);
                for (const p of paths) {
                    const d = p.getAttribute('d');
                    if (!d) continue;
                    try {
                        const path2d = new Path2D(d);
                        ctx.stroke(path2d);
                    } catch {
                        // ignore unsupported path
                    }
                }
                ctx.restore();
            }

            // Nodes
            const nodeEls = Array.from(containerEl.querySelectorAll('.logic-chain-node'));
            for (const el of nodeEls) {
                const r = el.getBoundingClientRect();
                const x = r.left - containerRect.left;
                const y = r.top - containerRect.top;
                if (x + r.width < -40 || y + r.height < -40 || x > width + 40 || y > height + 40) continue;
                const level = Number(el.dataset.level) || 0;
                const fill =
                    level === 3 ? 'rgba(191, 219, 254, 0.98)' :
                    (level === 2 ? 'rgba(219, 234, 254, 0.98)' : 'rgba(239, 246, 255, 0.98)');
                const stroke =
                    level === 3 ? 'rgba(29, 78, 216, 0.9)' : 'rgba(29, 78, 216, 0.45)';
                const strokeW = level === 3 ? 2 : 1;
                drawRoundedRect(ctx, x, y, r.width, r.height, 12, fill, stroke, strokeW);
                const title = el.querySelector('.logic-chain-node-title')?.textContent || '';
                ctx.fillStyle = '#0f172a';
                ctx.font = '700 14px Inter, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif';
                wrapCanvasText(ctx, String(title || ''), x + 12, y + 22, r.width - 24, 18, 2);
            }

            // Labels
            const labelEls = Array.from(containerEl.querySelectorAll('.logic-chain-label'));
            for (const el of labelEls) {
                const r = el.getBoundingClientRect();
                const x = r.left - containerRect.left + r.width / 2;
                const y = r.top - containerRect.top + r.height / 2;
                if (x < -120 || y < -60 || x > width + 120 || y > height + 60) continue;
                const text = String(el.textContent || '').trim();
                if (!text) continue;
                ctx.font = '12px Inter, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif';
                const metrics = ctx.measureText(text);
                const padX = 8;
                const w = Math.ceil(metrics.width + padX * 2);
                const h = 20;
                drawRoundedRect(ctx, x - w / 2, y - h / 2, w, h, 8, '#ffffff', 'rgba(203, 213, 225, 0.9)', 1);
                ctx.fillStyle = '#1f2937';
                ctx.textBaseline = 'middle';
                ctx.fillText(text, x - w / 2 + padX, y);
            }

            return canvas.toDataURL('image/png');
        }

        function drawRoundedRect(ctx, x, y, w, h, r, fill, stroke, strokeW) {
            const rr = Math.min(r, w / 2, h / 2);
            ctx.beginPath();
            ctx.moveTo(x + rr, y);
            ctx.arcTo(x + w, y, x + w, y + h, rr);
            ctx.arcTo(x + w, y + h, x, y + h, rr);
            ctx.arcTo(x, y + h, x, y, rr);
            ctx.arcTo(x, y, x + w, y, rr);
            ctx.closePath();
            if (fill) {
                ctx.fillStyle = fill;
                ctx.fill();
            }
            if (stroke) {
                ctx.strokeStyle = stroke;
                ctx.lineWidth = strokeW || 1;
                ctx.stroke();
            }
        }

        function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight, maxLines) {
            const words = String(text || '').replace(/\s+/g, ' ').trim().split(' ');
            const lines = [];
            let line = '';
            for (const w of words) {
                const test = line ? (line + ' ' + w) : w;
                if (ctx.measureText(test).width <= maxWidth) {
                    line = test;
                } else {
                    if (line) lines.push(line);
                    line = w;
                }
            }
            if (line) lines.push(line);
            const sliced = lines.slice(0, Math.max(1, maxLines || 2));
            if (lines.length > sliced.length) {
                const last = sliced[sliced.length - 1];
                sliced[sliced.length - 1] = last.replace(/.{0,3}$/, '…');
            }
            for (let i = 0; i < sliced.length; i += 1) {
                ctx.fillText(sliced[i], x, y + i * lineHeight);
            }
        }

        btnGenerateMemo.addEventListener('click', async () => {
            if (!guardRequiresCoding()) return;
            if (isGeneratingMemo) return;
            isGeneratingMemo = true;
            setButtonLoading(btnGenerateMemo, true);

                const res = await fetch('/api/generate-memo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },

                memoPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });

            } finally {

                setButtonLoading(btnGenerateMemo, false);

            if (!win) return;
            win.document.write(

                '<h1>研究备忘录</h1>' +
                '<p style="white-space:pre-wrap;line-height:1.8">' + escapeHtml(memoDraft) + '</p>' +
                '<h2>当前编码树</h2><pre>' + escapeHtml(treeText) + '</pre>' +

        analyzeButton.addEventListener('click', runAnalyze);

        function formatDateYMD(d) {
            const dt = d instanceof Date ? d : new Date();
            const y = dt.getFullYear();
            const m = String(dt.getMonth() + 1).padStart(2, '0');
            const day = String(dt.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        }

        async function handleExportExcel() {
            if (!guardRequiresCoding()) return;
            if (isExportingExcel) return;

            const ExcelJSRef = window.ExcelJS;
            const saveAsRef = window.saveAs;
            if (!ExcelJSRef || !ExcelJSRef.Workbook || typeof saveAsRef !== 'function') {
                alert('Excel 导出库未加载。请在项目根目录执行：npm install exceljs file-saver，并确保页面已正确加载相关脚本。');
                return;
            }

            isExportingExcel = true;
            setButtonLoading(btnExportExcel, true);
            try {
                const codes = payload.codes.slice();
                const childrenByParent = new Map();
                for (const c of codes) {
                    const pid = c.parentId ? String(c.parentId) : '__root__';
                    if (!childrenByParent.has(pid)) childrenByParent.set(pid, []);
                    childrenByParent.get(pid).push(c);
                }

                const l3List = codes
                    .filter(c => Number(c.level) === 3)
                    .sort((a, b) => String(a.name || '').localeCompare(String(b.name || ''), 'zh-CN'));

                const workbook = new ExcelJSRef.Workbook();
                const worksheet = workbook.addWorksheet('编码表');

                // 表头
                worksheet.addRow(['一级编码', '二级编码', '三级编码']);

                /** @type {{ startRow: number, endRow: number }[]} */
                const l3RowRanges = [];

                for (const l3 of l3List) {
                    const startRow = worksheet.rowCount + 1;
                    const l2List = (childrenByParent.get(String(l3.id)) || [])
                        .filter(x => Number(x.level) === 2)
                        .sort((a, b) => String(a.name || '').localeCompare(String(b.name || ''), 'zh-CN'));

                    if (!l2List.length) {
                        worksheet.addRow(['', '', String(l3.name || '')]);
                    } else {
                        for (const l2 of l2List) {
                            const l1List = (childrenByParent.get(String(l2.id)) || [])
                                .filter(x => Number(x.level) === 1)
                                .sort((a, b) => String(a.name || '').localeCompare(String(b.name || ''), 'zh-CN'));

                            const l1Text = l1List
                                .map((l1, idx) => `${idx + 1}. ${String(l1.name || '').trim()}`)
                                .filter(Boolean)
                                .join('\n');

                            worksheet.addRow([l1Text, String(l2.name || ''), String(l3.name || '')]);
                        }
                    }

                    const endRow = worksheet.rowCount;
                    l3RowRanges.push({ startRow, endRow });
                }

                // 合并三级编码（C列）
                for (const { startRow, endRow } of l3RowRanges) {
                    if (endRow > startRow) {
                        worksheet.mergeCells(startRow, 3, endRow, 3);
                    }
                }

                // 列宽
                worksheet.getColumn(1).width = 35;
                worksheet.getColumn(2).width = 45;
                worksheet.getColumn(3).width = 30;

                // 表头样式
                const headerRow = worksheet.getRow(1);
                headerRow.eachCell((cell) => {
                    cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFFFF00' } };
                    cell.font = { bold: true };
                    cell.alignment = { horizontal: 'center', vertical: 'middle', wrapText: true };
                    cell.border = {
                        top: { style: 'thin' },
                        left: { style: 'thin' },
                        bottom: { style: 'thin' },
                        right: { style: 'thin' },
                    };
                });

                // 全表样式（有数据范围：1..rowCount, 1..3）
                for (let r = 1; r <= worksheet.rowCount; r += 1) {
                    for (let c = 1; c <= 3; c += 1) {
                        const cell = worksheet.getCell(r, c);
                        if (!cell.value && r !== 1) continue;
                        if (!cell.alignment) cell.alignment = {};
                        cell.alignment = { ...cell.alignment, vertical: 'middle', wrapText: true };
                        cell.border = {
                            top: { style: 'thin' },
                            left: { style: 'thin' },
                            bottom: { style: 'thin' },
                            right: { style: 'thin' },
                        };
                    }
                }

                const buffer = await workbook.xlsx.writeBuffer();
                const blob = new Blob([buffer], {
                    type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
                });
                saveAsRef(blob, '质性研究三级编码表.xlsx');
            } finally {
                isExportingExcel = false;
                setButtonLoading(btnExportExcel, false);
            }
        }
