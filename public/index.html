<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InsightAI · 学术溯源编码</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f6f9;
            --surface: #ffffff;
            --border: #e8eaef;
            --text: #1a1a1a;
            --muted: #5c6370;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --shadow-soft: 0 4px 24px rgba(15, 23, 42, 0.06);
            --radius: 12px;
            /* Morandi tints — 低饱和溯源高亮 */
            --lit-indigo: rgba(224, 231, 255, 0.62);
            --lit-indigo-ring: rgba(129, 140, 248, 0.35);
            --lit-mint: rgba(220, 252, 231, 0.55);
            --lit-mint-ring: rgba(74, 222, 128, 0.28);
            --mark-bg: rgba(224, 231, 255, 0.72);
            --transition-smooth: all 0.3s ease-in-out;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.65;
        }

        .app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 14px 22px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            box-shadow: 0 1px 0 rgba(15, 23, 42, 0.04);
        }

        .brand {
            font-weight: 700;
            font-size: 1.05rem;
            letter-spacing: -0.02em;
            color: var(--text);
        }

        .topbar-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .view-tabs {
            display: flex;
            gap: 8px;
            padding: 10px 20px 0;
            max-width: 1480px;
            width: 100%;
            margin: 0 auto;
        }

        .tab-btn {
            border: 1px solid var(--border);
            background: #fff;
            color: var(--muted);
            border-radius: 999px;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 0.82rem;
        }

        .tab-btn.active {
            color: #1d4ed8;
            border-color: rgba(37, 99, 235, 0.35);
            background: rgba(37, 99, 235, 0.1);
        }

        button.btn {
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 500;
            padding: 9px 16px;
            border-radius: 9px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        button.btn:hover:not(:disabled) {
            border-color: #c8ceda;
            background: #fafbfc;
        }

        button.btn-primary {
            background: var(--primary);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.22);
        }

        button.btn-primary:hover:not(:disabled) {
            background: var(--primary-hover);
            box-shadow: 0 6px 18px rgba(37, 99, 235, 0.28);
        }

        button.btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            box-shadow: none;
        }

        button.btn.is-loading {
            background: rgba(37, 99, 235, 0.16) !important;
            color: rgba(29, 78, 216, 0.95) !important;
            border-color: rgba(37, 99, 235, 0.18) !important;
            box-shadow: none !important;
        }

        .toast {
            position: fixed;
            left: 50%;
            top: 18px;
            transform: translateX(-50%);
            z-index: 9999;
            background: rgba(15, 23, 42, 0.92);
            color: #fff;
            padding: 10px 14px;
            border-radius: 999px;
            font-size: 0.9rem;
            letter-spacing: -0.01em;
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.26);
            border: 1px solid rgba(255, 255, 255, 0.12);
            opacity: 0;
            pointer-events: none;
            transition: opacity 160ms ease, transform 160ms ease;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .workspace {
            flex: 1;
            display: flex;
            min-height: 0;
            max-width: 1480px;
            width: 100%;
            margin: 0 auto;
            padding: 20px;
            gap: 20px;
        }

        .source-panel {
            flex: 0 0 min(320px, 32%);
            min-width: 240px;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-soft);
            overflow: hidden;
        }

        .source-panel header {
            padding: 14px 16px;
            font-weight: 600;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--border);
            color: var(--muted);
        }

        .source-panel textarea {
            flex: 1;
            min-height: 280px;
            border: none;
            padding: 16px;
            font: inherit;
            font-size: 0.9375rem;
            line-height: 1.65;
            color: var(--text);
            resize: vertical;
            background: #f8f9fb;
        }

        .source-panel textarea:focus {
            outline: none;
            background: var(--surface);
            box-shadow: inset 0 0 0 2px rgba(37, 99, 235, 0.15);
        }

        .source-panel .source-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
        }

        .reader-panel {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-soft);
            position: relative;
            overflow: hidden;
        }

        .reader-panel header {
            padding: 14px 20px;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .reader-panel header span.hint {
            font-weight: 400;
            font-size: 0.8125rem;
            color: var(--muted);
        }

        .reader-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px 28px;
            scroll-behavior: smooth;
        }

        .reader-empty {
            color: var(--muted);
            font-size: 0.9375rem;
            text-align: center;
            padding: 48px 24px;
        }

        .text-block {
            --block-lit-bg: var(--lit-indigo);
            --block-lit-ring: var(--lit-indigo-ring);
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 12px;
            line-height: 1.65;
            font-size: 0.9375rem;
            color: var(--text);
            background: transparent;
            transition: background-color 0.3s ease-in-out, box-shadow 0.3s ease-in-out, transform 0.3s ease-in-out;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .text-block:nth-child(4n+2) {
            --block-lit-bg: var(--lit-mint);
            --block-lit-ring: var(--lit-mint-ring);
        }

        .text-block:hover {
            background: rgba(15, 23, 42, 0.03);
        }

        .text-block.is-lit {
            background: var(--block-lit-bg);
            box-shadow: inset 0 0 0 1px var(--block-lit-ring), 0 8px 24px rgba(15, 23, 42, 0.05);
        }

        .text-block .speaker {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .text-block .block-body {
            white-space: pre-wrap;
            word-break: break-word;
        }

        .text-block .block-tags {
            margin-top: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .code-badge {
            border: 1px solid rgba(37, 99, 235, 0.25);
            background: rgba(37, 99, 235, 0.1);
            color: #1d4ed8;
            border-radius: 999px;
            padding: 3px 10px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .code-badge:hover {
            background: rgba(37, 99, 235, 0.16);
            border-color: rgba(37, 99, 235, 0.35);
        }

        .basis-panel {
            margin-top: 8px;
            padding: 10px 12px;
            border-radius: 8px;
            background: rgba(15, 23, 42, 0.04);
            border: 1px dashed rgba(15, 23, 42, 0.15);
            font-size: 0.82rem;
            color: var(--muted);
            line-height: 1.55;
        }

        .basis-title {
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
        }

        .text-block.is-pulse {
            animation: blockPulse 0.38s ease-in-out 2;
        }

        @keyframes blockPulse {
            0% { transform: translateY(0); box-shadow: inset 0 0 0 1px var(--block-lit-ring), 0 8px 24px rgba(15, 23, 42, 0.05); }
            50% { transform: translateY(-1px); box-shadow: inset 0 0 0 1px rgba(37, 99, 235, 0.45), 0 12px 30px rgba(37, 99, 235, 0.2); }
            100% { transform: translateY(0); box-shadow: inset 0 0 0 1px var(--block-lit-ring), 0 8px 24px rgba(15, 23, 42, 0.05); }
        }

        mark.trace-mark {
            background: var(--mark-bg);
            color: var(--text);
            border-radius: 4px;
            padding: 0.08em 0.12em;
            transition: background-color 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
            box-decoration-break: clone;
        }

        .trace-sidebar {
            flex: 0 0 300px;
            min-width: 260px;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-soft);
            overflow: hidden;
        }

        .trace-sidebar header {
            padding: 14px 16px;
            font-weight: 600;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--border);
        }

        .code-tree {
            flex: 1;
            overflow-y: auto;
            padding: 12px 10px 16px;
        }

        .code-node {
            margin-bottom: 6px;
            border-radius: 10px;
            transition: transform 0.3s ease-in-out, background-color 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
            display: flex;
            align-items: stretch;
            gap: 8px;
        }

        .tree-node {
            position: relative;
        }

        .tree-node .code-node {
            margin-bottom: 4px;
        }

        .tree-children {
            margin-left: 14px;
            padding-left: 12px;
            border-left: 1px dashed rgba(15, 23, 42, 0.22);
        }

        .tree-toggle {
            display: inline-block;
            width: 14px;
            color: var(--muted);
            margin-right: 6px;
            transition: transform 0.2s ease;
            font-weight: 700;
        }

        .tree-toggle.is-expanded {
            transform: rotate(90deg);
        }

        .code-node button.code-hit {
            flex: 1;
            width: auto;
            text-align: left;
            font: inherit;
            cursor: pointer;
            border: 1px solid transparent;
            background: rgba(15, 23, 42, 0.03);
            border-radius: 10px;
            padding: 10px 12px;
            color: var(--text);
            transition: var(--transition-smooth);
        }

        .code-pick {
            flex: 0 0 auto;
            width: 16px;
            margin-top: 14px;
            accent-color: #2563eb;
            cursor: pointer;
        }

        .code-node button.code-hit:hover {
            background: rgba(15, 23, 42, 0.055);
            border-color: rgba(15, 23, 42, 0.06);
        }

        .code-node.is-active button.code-hit {
            transform: scale(1.02);
            background: rgba(37, 99, 235, 0.14);
            border-color: rgba(37, 99, 235, 0.55);
            box-shadow:
                0 10px 24px rgba(37, 99, 235, 0.14),
                0 6px 20px rgba(15, 23, 42, 0.08),
                inset 4px 0 0 rgba(37, 99, 235, 0.95);
        }

        .code-node.is-active .code-name {
            font-weight: 700;
            color: #0b2a6b;
        }

        .code-node.is-active .code-refs {
            color: rgba(11, 42, 107, 0.78);
        }

        .code-node.is-pulse button.code-hit {
            animation: codePulse 0.65s ease-in-out;
        }

        @keyframes codePulse {
            0% { transform: scale(1); }
            40% { transform: scale(1.04); }
            100% { transform: scale(1); }
        }

        .code-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .level-pill {
            font-size: 0.65rem;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
            letter-spacing: 0.04em;
        }

        .level-pill.l1 { background: #e8e4f0; color: #5b5670; }
        .level-pill.l2 { background: #dfe8e4; color: #4a5c52; }
        .level-pill.l3 { background: #ebe5dc; color: #6b5f4a; }

        .code-name {
            font-weight: 600;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .code-refs {
            font-size: 0.72rem;
            color: var(--muted);
            margin-top: 4px;
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.72);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .loading-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .loader {
            width: 36px;
            height: 36px;
            border: 3px solid #e8eaef;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.85s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-banner {
            margin: 12px 20px;
            padding: 12px 14px;
            border-radius: 10px;
            background: #fef2f2;
            color: #b91c1c;
            font-size: 0.875rem;
            border: 1px solid #fecaca;
        }

        .hidden { display: none !important; }

        .modeling-wrap {
            max-width: 1480px;
            width: 100%;
            margin: 0 auto;
            padding: 16px 20px 20px;
        }

        .modeling-canvas {
            min-height: 420px;
            position: relative;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: auto;
            padding: 16px;
            background-image:
                radial-gradient(circle at 1px 1px, rgba(15, 23, 42, 0.12) 1px, transparent 1.2px);
            background-size: 16px 16px;
            background-position: 0 0;
        }

        .model-lines {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .model-layout {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: stretch;
            gap: 20px;
            min-height: 388px;
            min-width: 980px;
        }

        .model-tree {
            flex: 1 1 auto;
            display: flex;
            align-items: stretch;
            gap: 28px;
            padding: 14px 6px 14px 2px;
            border-right: 1px dashed rgba(15, 23, 42, 0.12);
        }

        .l3-column,
        .l2-column,
        .l1-column {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .l3-column {
            min-width: 210px;
            justify-content: center;
        }

        .l2-column {
            min-width: 250px;
            justify-content: flex-start;
        }

        .l1-column {
            min-width: 280px;
            justify-content: flex-start;
        }

        .tree-row {
            display: flex;
            gap: 24px;
            align-items: flex-start;
            margin-bottom: 14px;
        }

        .model-edge {
            pointer-events: stroke;
            cursor: pointer;
        }

        .model-edge-label {
            paint-order: stroke fill;
            stroke: rgba(255, 255, 255, 0.98);
            stroke-width: 3.25px;
            stroke-linejoin: round;
            stroke-linecap: round;
        }

        .model-node {
            min-width: 120px;
            max-width: 220px;
            padding: 8px 10px;
            border: 1px solid rgba(37, 99, 235, 0.28);
            border-radius: 10px;
            background: rgba(237, 242, 255, 0.9);
            font-size: 0.82rem;
            cursor: pointer;
            user-select: none;
        }

        .model-node.is-core-l3 {
            background: rgba(191, 219, 254, 0.92);
            border: 2px solid rgba(29, 78, 216, 0.75);
            box-shadow:
                0 10px 28px rgba(37, 99, 235, 0.18),
                0 0 0 10px rgba(147, 197, 253, 0.18);
        }

        .empty-tip {
            color: var(--muted);
            font-size: 0.8rem;
        }

        .logic-graph-scroll {
            width: 100%;
            height: 100%;
            overflow-x: auto;
            overflow-y: auto;
            padding-bottom: 10px;
        }

        .logic-graph-canvas {
            width: max-content;
            min-width: 100%;
            height: 100%;
            padding-right: 60px;
            background: radial-gradient(circle at 1px 1px, rgba(15, 23, 42, 0.08) 1px, transparent 1.2px);
            background-size: 18px 18px;
            background-position: 0 0;
        }

        .logic-chains {
            position: relative;
            min-width: 980px;
            padding: 18px;
        }

        .logic-chain {
            position: relative;
            padding: 18px 60px 22px 18px;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(15, 23, 42, 0.12);
            border-radius: 14px;
            box-shadow: 0 8px 26px rgba(15, 23, 42, 0.08);
            margin-bottom: 48px;
        }

        .logic-chain:last-child {
            margin-bottom: 0;
        }

        .logic-chain-title {
            font-weight: 700;
            font-size: 0.92rem;
            color: #111827;
            margin-bottom: 12px;
            display: flex;
            align-items: baseline;
            gap: 10px;
        }

        .logic-chain-title .meta {
            font-weight: 600;
            font-size: 0.78rem;
            color: #6b7280;
        }

        .logic-chain-stage {
            position: relative;
            overflow: visible;
        }

        .logic-chain-edges {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .logic-chain-nodes {
            position: absolute;
            inset: 0;
            z-index: 2;
        }

        .logic-chain-labels {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: none;
        }

        .logic-chain-node {
            position: absolute;
            width: 250px;
            max-width: 250px;
            height: auto;
            min-height: 40px;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(29, 78, 216, 0.34);
            background: rgba(239, 246, 255, 0.95);
            color: #0f172a;
            box-shadow: 0 10px 22px rgba(15, 23, 42, 0.08);
            user-select: none;
            white-space: normal;
            word-break: break-word;
            overflow-wrap: break-word;
        }

        .logic-chain-node[data-level="3"] {
            border: 2px solid rgba(29, 78, 216, 0.8);
            background: rgba(191, 219, 254, 0.96);
        }

        .logic-chain-node[data-level="2"] {
            border: 1px solid rgba(29, 78, 216, 0.45);
            background: rgba(219, 234, 254, 0.96);
        }

        .logic-chain-node-title {
            font-weight: 700;
            font-size: 0.88rem;
            line-height: 1.5;
        }

        .logic-chain-node-sub {
            margin-top: 6px;
            font-size: 0.74rem;
            color: rgba(17, 24, 39, 0.7);
            line-height: 1.5;
            display: block;
            word-break: break-word;
            overflow-wrap: break-word;
        }

        .logic-chain-label {
            position: absolute;
            transform: translate(-50%, -50%);
            background-color: #ffffff;
            padding: 4px 8px;
            border-radius: 8px;
            border: 1px solid rgba(203, 213, 225, 0.9);
            box-shadow: 0 6px 16px rgba(15, 23, 42, 0.08);
            color: #1f2937;
            font-size: 12px;
            line-height: 1.2;
            white-space: nowrap;
        }

        .logic-inline {
            max-width: 1480px;
            width: 100%;
            margin: 0 auto;
            padding: 0 20px 26px;
        }

        .logic-inline.hidden {
            display: none;
        }

        .logic-inline-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 16px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 12px 12px 0 0;
            font-weight: 700;
        }

        .logic-inline-body {
            height: min(820px, 78vh);
            background: #fff;
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 12px 12px;
            overflow: hidden;
        }

        .memo-panel {
            max-width: 1480px;
            width: 100%;
            margin: 0 auto;
            padding: 12px 20px 0;
        }

        .memo-card {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: var(--shadow-soft);
            padding: 14px;
        }

        .memo-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .memo-text {
            white-space: pre-wrap;
            line-height: 1.75;
            font-size: 0.93rem;
        }

        @media (max-width: 1100px) {
            .workspace {
                flex-wrap: wrap;
            }
            .source-panel {
                flex: 1 1 100%;
                min-width: 100%;
            }
            .reader-panel {
                flex: 1 1 calc(100% - 320px);
                min-height: 420px;
            }
            .trace-sidebar {
                flex: 1 1 100%;
                max-height: 420px;
            }
        }

        @media (max-width: 640px) {
            .topbar { flex-direction: column; align-items: stretch; }
            .workspace { padding: 12px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="topbar">
            <div class="brand">InsightAI · 学术溯源</div>
            <div class="topbar-actions">

    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exceljs/dist/exceljs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script>
        /**
         * @typedef {{ id: string, text: string, speaker: string }} TextBlock
         * @typedef {{ blockId: string, start?: number, end?: number }} SpanRef
         * @typedef {{ id: string, name: string, level: number, parentId: string|null, refs: SpanRef[], basisId?: string }} CodeNode
         * @typedef {{ blocks: TextBlock[], codes: CodeNode[] }} AnalysisPayload
         */

        const interviewText = document.getElementById('interviewText');
        const analyzeButton = document.getElementById('analyzeButton');
        const readerEmpty = document.getElementById('readerEmpty');
        const readerBlocks = document.getElementById('readerBlocks');
        const codeTree = document.getElementById('codeTree');
        const codeTreeEmpty = document.getElementById('codeTreeEmpty');
        const errorMessage = document.getElementById('errorMessage');
        const readerLoading = document.getElementById('readerLoading');
        const btnExportExcel = document.getElementById('btnExportExcel');
        const btnSmartConnectGlobal = document.getElementById('btnSmartConnectGlobal');
        const btnGenerateMemo = document.getElementById('btnGenerateMemo');
        const btnDownloadLogicImage = document.getElementById('btnDownloadLogicImage');
        const memoPanel = document.getElementById('memoPanel');
        const memoText = document.getElementById('memoText');
        const btnExportWord = document.getElementById('btnExportWord');
        const btnExportPdf = document.getElementById('btnExportPdf');
        const tabCoding = document.getElementById('tabCoding');
        const codingView = document.getElementById('codingView');
        const logicGraphScroll = document.getElementById('logicGraphScroll');
        const logicGraphCanvas = document.getElementById('logicGraphCanvas');
        const logicCanvasSection = document.getElementById('logicCanvasSection');
        const logicCanvasHint = document.getElementById('logicCanvasHint');

        /** @type {AnalysisPayload | null} */
        let payload = null;
        /** @type {{ id: string, topic: string, definition: string, paradigm: string, content: string }[]} */
        let academicBase = [];
        /** @type {Promise<void> | null} */
        let academicBaseReady = null;
        /** @type {string | null} */
        let activeCodeId = null;
        /** @type {string | null} */
        let expandedBadgeKey = null;
        /** @type {Map<string, string[]>} blockId -> code ids */
        let blockToCodes = new Map();
        /** @type {Map<string, string|null>} */
        let parentByCodeId = new Map();
        /** @type {Map<string, any[]>} */
        let childrenByCodeId = new Map();
        /** @type {Set<string>} */
        let expandedTreeIds = new Set();
        /** @type {boolean} */
        let isLogicCanvasVisible = false;
        /** @type {string} */
        let memoDraft = '';
        /** @type {boolean} */
        let isGeneratingRelations = false;
        /** @type {boolean} */
        let isExportingExcel = false;
        /** @type {boolean} */
        let isGeneratingMemo = false;
        /** @type {boolean} */
        let isDownloadingLogicImage = false;

        let toastTimer = null;
        function showToast(message) {
            const text = String(message || '').trim();
            if (!text) return;
            let el = document.getElementById('toast');
            if (!el) {
                el = document.createElement('div');
                el.id = 'toast';
                el.className = 'toast';
                el.setAttribute('role', 'status');
                el.setAttribute('aria-live', 'polite');
                document.body.appendChild(el);
            }
            el.textContent = text;
            el.classList.add('show');
            if (toastTimer) window.clearTimeout(toastTimer);
            toastTimer = window.setTimeout(() => {
                el.classList.remove('show');
            }, 1600);
        }

        function hasCodingData() {
            return Boolean(payload && Array.isArray(payload.codes) && payload.codes.length > 0);
        }

        function guardRequiresCoding() {
            if (hasCodingData()) return true;
            showToast('请完成一次编码');
            return false;
        }

        function setButtonLoading(btn, on) {
            if (!btn) return;
            btn.classList.toggle('is-loading', Boolean(on));
            btn.disabled = Boolean(on);
        }
        if (btnDownloadLogicImage) btnDownloadLogicImage.addEventListener('click', handleDownloadLogicImage);

        function safeFilenamePart(s) {
            return (String(s || '').trim().replace(/[\\/:*?"<>|]/g, '_').replace(/\s+/g, '_').slice(0, 48)) || '未命名';
        }

        async function handleDownloadLogicImage() {
            const targetElement = logicGraphScroll || logicGraphCanvas;
            if (!targetElement) return;
            if (isDownloadingLogicImage) return;
            const chainsEl = (logicGraphCanvas || targetElement).querySelector?.('.logic-chains');
            if (!chainsEl) {
                showToast('暂无可下载的逻辑链路图');
                return;
            }

            const h2c = window.html2canvas;
            if (typeof h2c !== 'function') {
                alert('图片导出库未加载。请在项目根目录执行：npm install html2canvas，并确保页面已正确加载相关脚本。');
                return;
            }

            isDownloadingLogicImage = true;
            setButtonLoading(btnDownloadLogicImage, true);
            try {
                const prev = {
                    overflowX: targetElement.style.overflowX,
                    overflowY: targetElement.style.overflowY,
                    scrollTop: targetElement.scrollTop,
                    scrollLeft: targetElement.scrollLeft,
                };

                // 避免截图里出现滚动条；并确保捕获完整滚动内容
                targetElement.style.overflowX = 'visible';
                targetElement.style.overflowY = 'visible';
                targetElement.scrollTop = 0;
                targetElement.scrollLeft = 0;

                const captureWidth = Math.max(10, targetElement.scrollWidth);
                const captureHeight = Math.max(10, targetElement.scrollHeight);

                const canvas = await h2c(targetElement, {
                    useCORS: true,
                    backgroundColor: null,
                    scale: 2,
                    width: captureWidth,
                    height: captureHeight,
                    windowWidth: captureWidth,
                    windowHeight: captureHeight,
                    scrollX: 0,
                    scrollY: 0,
                });

                targetElement.style.overflowX = prev.overflowX;
                targetElement.style.overflowY = prev.overflowY;
                targetElement.scrollTop = prev.scrollTop;
                targetElement.scrollLeft = prev.scrollLeft;

                const titles = Array.from(
                    (logicGraphCanvas || targetElement).querySelectorAll('.logic-chain-title > span:first-child')
                ).map(el => String(el.textContent || '').trim()).filter(Boolean);
                const chainName = titles.length === 1 ? titles[0] : '线索链合集';
                const filename = `逻辑链路图_${safeFilenamePart(chainName)}_${formatDateYMD(new Date())}.png`;

                const url = canvas.toDataURL('image/png');
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                a.style.display = 'none';
                document.body.appendChild(a);
                a.click();
                a.remove();
            } finally {
                isDownloadingLogicImage = false;
                setButtonLoading(btnDownloadLogicImage, false);
            }
        }
        let logicGraphChart = null;

        function escapeHtml(s) {
            return s
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function flattenToText(input, lines = []) {
            if (input == null) return lines;
            if (Array.isArray(input)) {
                input.forEach(v => flattenToText(v, lines));
                return lines;
            }
            if (typeof input === 'object') {
                for (const [k, v] of Object.entries(input)) {
                    if (v != null && typeof v !== 'object') {
                        lines.push(k + ': ' + String(v));
                    } else {
                        lines.push(k);
                        flattenToText(v, lines);
                    }
                }
                return lines;
            }
            lines.push(String(input));
            return lines;
        }

        function normalizeAcademicKnowledge(raw) {
            const arr = Array.isArray(raw) ? raw : [raw];
            const out = [];
            let fallbackIndex = 0;

            for (const item of arr) {
                if (!item || typeof item !== 'object') continue;
                const topic = item.topic || item.知识点 || item.knowledgePoint || '未命名规范';
                const allText = flattenToText(item).join('；').replace(/\s+/g, ' ').trim();
                let id = '';
                if (String(topic).includes('过程编码') || allText.includes('过程编码')) {
                    id = 'Saldana-A';
                } else if (String(topic).includes('模式编码') || allText.includes('模式编码')) {
                    id = 'Saldana-B';
                } else {
                    id = 'Charmaz-' + String.fromCharCode(65 + fallbackIndex);
                    fallbackIndex += 1;
                }
                const contentSource =
                    item.content ||
                    item.theoryRules ||
                    item.理论规则 ||
                    item.applicationLogic ||
                    item.应用逻辑 ||
                    item.知识点 ||
                    item;
                const content = flattenToText(contentSource).join('；').replace(/\s+/g, ' ').trim();
                const definition = flattenToText(item.定义 || item.definition || item.理论规则 || item.theoryRules || item).join('；').replace(/\s+/g, ' ').trim();
                out.push({
                    id,
                    topic: String(topic),
                    definition: definition || content || '无定义',
                    paradigm: String(String(topic).includes('编码') ? '扎根理论编码范式' : '质性研究方法论'),
                    content: content || '无详细内容',
                });
            }
            return out;
        }

        async function ensureAcademicBaseReady() {
            if (academicBaseReady) return academicBaseReady;
            academicBaseReady = (async () => {
                const candidates = ['/data/academic-knowledge.json', '/src/data/academic-knowledge.json'];
                let raw = null;
                for (const url of candidates) {
                    try {
                        const res = await fetch(url, { cache: 'no-store' });
                        if (!res.ok) continue;
                        raw = await res.json();
                        break;
                    } catch (_) {}
                }
                if (!raw) {
                    throw new Error('无法加载 academic-knowledge.json，请确认数据文件可访问。');
                }
                academicBase = normalizeAcademicKnowledge(raw);
            })();
            return academicBaseReady;
        }

        function validatePayload(p) {
            if (!p || typeof p !== 'object') throw new Error('无效载荷');
            if (!Array.isArray(p.blocks) || !Array.isArray(p.codes)) throw new Error('缺少 blocks 或 codes');
            const blockIds = new Set(p.blocks.map(b => b.id));
            for (const c of p.codes) {
                if (c.parentId === 'null' || c.parentId === '') c.parentId = null;
                c.level = Number(c.level);
                if (![1, 2, 3].includes(c.level)) throw new Error(`编码 ${c.id || ''} 的 level 须为 1/2/3`);
                if (!c.basisId || typeof c.basisId !== 'string') throw new Error(`编码 ${c.id || ''} 缺少 basisId`);
                if (!c.refs || !c.refs.length) throw new Error(`编码 ${c.id || ''} 缺少 refs`);
                for (const r of c.refs) {
                    if (!blockIds.has(r.blockId)) throw new Error(`refs 引用未知 blockId: ${r.blockId}`);
                }
            }
        }

        function attrSel(s) {
            return String(s).replace(/\\/g, '\\\\').replace(/"/g, '\\"');
        }

        function getBasisById(basisId) {
            if (!basisId) return null;
            return academicBase.find(x => x.id === basisId) || null;
        }

        function switchTab(tab) {
            const modeling = tab === 'modeling';
            if (tabCoding) tabCoding.classList.toggle('active', !modeling);
            const target = modeling ? (logicCanvasSection || codingView) : codingView;
            if (target && target.scrollIntoView) {
                target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        function buildLogicalSubGraphData() {
            return { nodes: [], links: [] };
        }

        function openLogicModalWithGraph(subGraphData) {
            if (!logicGraphCanvas || !logicCanvasSection) return;
            isLogicCanvasVisible = true;
            logicCanvasSection.classList.remove('hidden');
            if (logicCanvasHint) logicCanvasHint.textContent = '';
            renderIndependentLogicChains(subGraphData);
            logicCanvasSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        /**
         * Independent Logic Chains
         * - 数据清洗：仅保留出现在 links 的 source/target 的节点
         * - 分组：连通分量（按无向连通）
         * - 布局：组件纵向排列，组件内从左到右分层（近似 dag 布局），分支竖向对齐
         * - 绘制：SVG 贝塞尔曲线 + HTML 白底标签层（最高优先级防遮挡）
         */
        const LOGIC_CHAIN_LAYOUT = {
            cardWidth: 250,
            cardHeight: 40,
            cardPadX: 12,
            cardPadY: 10,
            colGap: 120,
            rowGap: 120,
            chainMinHeight: 0,
            chainPadding: 18,
            labelLift: 14,
            bezierDxMin: 72,
            bezierDxMax: 180,
            chainRightPad: 60,
        };

        /** @type {null | { width:number, height:number, nodes:any[], edges:any[], labels:any[] }} */
        let logicChainsRenderState = null;

        function renderIndependentLogicChains(subGraphData) {
            const cleaned = buildCleanLogicGraph(subGraphData);
            const components = buildConnectedComponents(cleaned.nodes, cleaned.links);

            logicGraphCanvas.innerHTML = '';
            const wrap = document.createElement('div');
            wrap.className = 'logic-chains';
            logicGraphCanvas.appendChild(wrap);

            const allRenderNodes = [];
            const allRenderEdges = [];
            const allRenderLabels = [];
            let maxStageWidth = 0;
            let totalStageHeight = 0;

            if (!components.length) {
                wrap.innerHTML = '<div class="empty-tip" style="padding:16px 8px">暂无可用的独立逻辑线索链</div>';
                logicChainsRenderState = null;
                return;
            }

            components.forEach((component, idx) => {
                const laidOut = layoutLogicComponent(component.nodes, component.links);
                maxStageWidth = Math.max(maxStageWidth, laidOut.width);
                totalStageHeight += Math.max(laidOut.height, LOGIC_CHAIN_LAYOUT.chainMinHeight);
                if (idx < components.length - 1) totalStageHeight += 48;
                const chainEl = document.createElement('section');
                chainEl.className = 'logic-chain';
                chainEl.dataset.chainIndex = String(idx + 1);

                const title = document.createElement('div');
                title.className = 'logic-chain-title';
                const labelText = document.createElement('span');
                labelText.textContent = '线索链 ' + String.fromCharCode(65 + (idx % 26));
                const meta = document.createElement('span');
                meta.className = 'meta';
                meta.textContent = `节点 ${laidOut.nodes.length} · 关系 ${laidOut.links.length}`;
                title.appendChild(labelText);
                title.appendChild(meta);
                chainEl.appendChild(title);

                const stage = document.createElement('div');
                stage.className = 'logic-chain-stage';
                stage.style.width = laidOut.width + 'px';
                stage.style.height = Math.max(laidOut.height, LOGIC_CHAIN_LAYOUT.chainMinHeight) + 'px';

                const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                svg.setAttribute('class', 'logic-chain-edges');
                svg.setAttribute('width', String(laidOut.width));
                svg.setAttribute('height', String(Math.max(laidOut.height, LOGIC_CHAIN_LAYOUT.chainMinHeight)));
                svg.setAttribute('viewBox', `0 0 ${laidOut.width} ${Math.max(laidOut.height, LOGIC_CHAIN_LAYOUT.chainMinHeight)}`);

                const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
                const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
                marker.setAttribute('id', `logicArrow_${idx}`);
                marker.setAttribute('markerWidth', '12');
                marker.setAttribute('markerHeight', '12');
                marker.setAttribute('refX', '11');
                marker.setAttribute('refY', '6');
                marker.setAttribute('orient', 'auto');
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', 'M0,0 L12,6 L0,12 z');
                path.setAttribute('fill', '#334155');
                marker.appendChild(path);
                defs.appendChild(marker);
                svg.appendChild(defs);

                const nodesLayer = document.createElement('div');
                nodesLayer.className = 'logic-chain-nodes';
                const labelsLayer = document.createElement('div');
                labelsLayer.className = 'logic-chain-labels';

                const nodeIdToCardEl = new Map();
                for (const n of laidOut.nodes) {
                    const card = document.createElement('div');
                    card.className = 'logic-chain-node';
                    card.dataset.level = String(n.level || '');
                    card.dataset.nodeId = String(n.id || '');
                    card.style.left = n.x.toFixed(1) + 'px';
                    card.style.top = n.y.toFixed(1) + 'px';

                    const t = document.createElement('div');
                    t.className = 'logic-chain-node-title';
                    t.textContent = String(n.name || '').trim() || '未命名概念';
                    const sub = document.createElement('div');
                    sub.className = 'logic-chain-node-sub';
                    sub.textContent = n.codeId ? ('编码ID: ' + n.codeId) : '';

                    card.appendChild(t);
                    card.appendChild(sub);
                    nodesLayer.appendChild(card);
                    nodeIdToCardEl.set(String(n.id), card);

                    allRenderNodes.push({
                        id: n.id,
                        name: n.name,
                        level: n.level,
                        x: n.x,
                        y: n.y,
                        w: LOGIC_CHAIN_LAYOUT.cardWidth,
                        h: LOGIC_CHAIN_LAYOUT.cardHeight,
                    });
                }

                stage.appendChild(svg);
                stage.appendChild(nodesLayer);
                stage.appendChild(labelsLayer);
                chainEl.appendChild(stage);
                wrap.appendChild(chainEl);

                // 直线连线：基于 DOM 实测卡片边界，保证起点贴合右侧边框，终点贴合左侧边框
                requestAnimationFrame(() => {
                    // 卡片高度自适应后，按真实高度重新排版，避免文本增高导致重叠
                    try {
                        const layerToNodes = new Map();
                        for (const n of laidOut.nodes) {
                            const l = Number(n._layer || 0);
                            if (!layerToNodes.has(l)) layerToNodes.set(l, []);
                            layerToNodes.get(l).push(n);
                        }
                        let maxBottom = 0;
                        for (const [l, arr] of layerToNodes.entries()) {
                            arr.sort((a, b) => Number(a._row || 0) - Number(b._row || 0));
                            let y = LOGIC_CHAIN_LAYOUT.chainPadding;
                            for (const n of arr) {
                                const el = nodeIdToCardEl.get(String(n.id));
                                if (!el) continue;
                                el.style.left = (LOGIC_CHAIN_LAYOUT.chainPadding + l * (LOGIC_CHAIN_LAYOUT.cardWidth + LOGIC_CHAIN_LAYOUT.colGap)).toFixed(1) + 'px';
                                el.style.top = y.toFixed(1) + 'px';
                                const h = Math.max(LOGIC_CHAIN_LAYOUT.cardHeight, el.getBoundingClientRect().height || 0);
                                y += h + LOGIC_CHAIN_LAYOUT.rowGap;
                                maxBottom = Math.max(maxBottom, y);
                            }
                        }
                        const stageHeight = Math.max(
                            Math.max(laidOut.height, LOGIC_CHAIN_LAYOUT.chainMinHeight),
                            maxBottom + LOGIC_CHAIN_LAYOUT.chainPadding
                        );
                        stage.style.height = stageHeight + 'px';
                        svg.setAttribute('height', String(stageHeight));
                        svg.setAttribute('viewBox', `0 0 ${laidOut.width} ${stageHeight}`);
                    } catch (e) {
                        // 保持原布局，继续画线
                    }
                    drawStraightEdgesForStage({
                        stageEl: stage,
                        svgEl: svg,
                        labelsLayerEl: labelsLayer,
                        links: laidOut.links,
                        nodeIdToCardEl,
                        arrowMarkerId: `logicArrow_${idx}`,
                        allRenderEdges,
                        allRenderLabels,
                    });
                });
            });

            logicChainsRenderState = {
                width: maxStageWidth,
                height: totalStageHeight,
                nodes: allRenderNodes,
                edges: allRenderEdges,
                labels: allRenderLabels,
            };
        }

        function drawStraightEdgesForStage(opts) {
            const stageEl = opts.stageEl;
            const svgEl = opts.svgEl;
            const labelsLayerEl = opts.labelsLayerEl;
            const links = Array.isArray(opts.links) ? opts.links : [];
            const nodeIdToCardEl = opts.nodeIdToCardEl;
            const arrowMarkerId = opts.arrowMarkerId;
            const allRenderEdges = opts.allRenderEdges;
            const allRenderLabels = opts.allRenderLabels;

            if (!stageEl || !svgEl || !labelsLayerEl || !nodeIdToCardEl) return;

            // 清空旧边/标签（保留 defs）
            while (svgEl.lastChild && svgEl.lastChild.tagName !== 'defs') {
                svgEl.removeChild(svgEl.lastChild);
            }
            labelsLayerEl.innerHTML = '';

            const stageRect = stageEl.getBoundingClientRect();
            for (const e of links) {
                const sEl = nodeIdToCardEl.get(String(e.source));
                const tEl = nodeIdToCardEl.get(String(e.target));
                if (!sEl || !tEl) continue;
                const sr = sEl.getBoundingClientRect();
                const tr = tEl.getBoundingClientRect();

                const x1 = sr.right - stageRect.left; // 紧贴 source 右边框
                const y1 = sr.top - stageRect.top + sr.height / 2;
                const x2 = tr.left - stageRect.left; // 紧贴 target 左边框
                const y2 = tr.top - stageRect.top + tr.height / 2;

                const edgePath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                edgePath.setAttribute('d', `M ${x1.toFixed(1)} ${y1.toFixed(1)} L ${x2.toFixed(1)} ${y2.toFixed(1)}`);
                edgePath.setAttribute('fill', 'none');
                edgePath.setAttribute('stroke', 'rgba(51, 65, 85, 0.95)');
                edgePath.setAttribute('stroke-width', '2');
                edgePath.setAttribute('marker-end', `url(#${arrowMarkerId})`);
                edgePath.setAttribute('stroke-linecap', 'round');
                edgePath.setAttribute('stroke-linejoin', 'round');
                svgEl.appendChild(edgePath);

                const midX = (x1 + x2) / 2;
                const midY = (y1 + y2) / 2;
                const relationText = simplifyRelationVerb(e.label, e.relationType);
                const labelEl = document.createElement('div');
                labelEl.className = 'logic-chain-label';
                labelEl.textContent = relationText;
                labelEl.style.left = midX.toFixed(1) + 'px';
                labelEl.style.top = (midY - LOGIC_CHAIN_LAYOUT.labelLift).toFixed(1) + 'px';
                labelsLayerEl.appendChild(labelEl);

                if (Array.isArray(allRenderEdges)) {
                    allRenderEdges.push({
                        source: String(e.source),
                        target: String(e.target),
                        d: `M ${x1.toFixed(1)} ${y1.toFixed(1)} L ${x2.toFixed(1)} ${y2.toFixed(1)}`,
                        p0: { x: x1, y: y1 },
                        p1: { x: x1, y: y1 },
                        p2: { x: x2, y: y2 },
                        p3: { x: x2, y: y2 },
                    });
                }
                if (Array.isArray(allRenderLabels)) {
                    allRenderLabels.push({
                        text: relationText,
                        x: midX,
                        y: midY - LOGIC_CHAIN_LAYOUT.labelLift,
                    });
                }
            }
        }

        function simplifyRelationVerb(rawLabel, fallbackRelationType) {
            const fallback = String(fallbackRelationType || '').trim() || '关联';
            const raw = String(rawLabel || '').trim();
            if (!raw) return fallback;

            // 优先从形如：[A] --关系--> [B] / [A]->关系->[B] 中提取中间关系词
            const m1 = raw.match(/\]\s*[-=]*\s*([^\[\]<>—\-]{1,18}?)\s*[-=]*\s*>?\s*\[/);
            if (m1 && m1[1]) {
                const v = String(m1[1]).trim();
                if (v) return v;
            }
            const m2 = raw.match(/--\s*([^-\n]{1,18}?)\s*-->/);
            if (m2 && m2[1]) {
                const v = String(m2[1]).trim();
                if (v) return v;
            }

            // 兜底：清理掉节点名与箭头符号，仅保留短词
            let cleaned = raw
                .replace(/\[[^\]]*?\]/g, ' ')
                .replace(/<[^>]*?>/g, ' ')
                .replace(/-{1,3}>|<{1,3}-|->|<-|—+|--+/g, ' ')
                .replace(/\s+/g, ' ')
                .trim();
            if (!cleaned) return fallback;
            if (cleaned.length > 18) cleaned = cleaned.slice(0, 18);
            return cleaned || fallback;
        }

        function buildCleanLogicGraph(subGraphData) {
            const rawNodes = Array.isArray(subGraphData?.nodes) ? subGraphData.nodes : [];
            const rawLinks = Array.isArray(subGraphData?.links) ? subGraphData.links : [];
            const usefulIds = new Set();
            const links = rawLinks
                .map(e => ({
                    source: String(e?.source || '').trim(),
                    target: String(e?.target || '').trim(),
                    relationType: String(e?.relationType || '').trim(),
                    label: String(e?.label || '').trim(),
                    confidence: typeof e?.confidence === 'number' && Number.isFinite(e.confidence) ? e.confidence : null,
                    isEssential: Boolean(e?.isEssential),
                }))
                .filter(e => e.source && e.target && e.source !== e.target);
            links.forEach(e => {
                usefulIds.add(e.source);
                usefulIds.add(e.target);
            });
            const nodes = rawNodes
                .filter(n => usefulIds.has(String(n?.id || '').trim()))
                .map(n => ({
                    id: String(n.id).trim(),
                    name: String(n.name || '').trim(),
                    codeId: String(n.codeId || '').trim(),
                    level: Number(n.level) || null,
                }));
            return { nodes, links };
        }

        function buildConnectedComponents(nodes, links) {
            const nodeById = new Map(nodes.map(n => [n.id, n]));
            const neighbors = new Map();
            for (const n of nodes) neighbors.set(n.id, new Set());
            for (const e of links) {
                if (!nodeById.has(e.source) || !nodeById.has(e.target)) continue;
                neighbors.get(e.source).add(e.target);
                neighbors.get(e.target).add(e.source);
            }

            const visited = new Set();
            const components = [];
            for (const n of nodes) {
                if (visited.has(n.id)) continue;
                const queue = [n.id];
                visited.add(n.id);
                const compIds = [];
                while (queue.length) {
                    const id = queue.shift();
                    compIds.push(id);
                    for (const nb of (neighbors.get(id) || [])) {
                        if (visited.has(nb)) continue;
                        visited.add(nb);
                        queue.push(nb);
                    }
                }
                const compNodes = compIds.map(id => nodeById.get(id)).filter(Boolean);
                const idSet = new Set(compIds);
                const compLinks = links.filter(e => idSet.has(e.source) && idSet.has(e.target));
                components.push({ nodes: compNodes, links: compLinks });
            }

            components.sort((a, b) => b.links.length - a.links.length);
            return components;
        }

        function layoutLogicComponent(nodes, links) {
            const byId = new Map(nodes.map(n => [n.id, n]));
            const indeg = new Map(nodes.map(n => [n.id, 0]));
            const out = new Map(nodes.map(n => [n.id, []]));
            for (const e of links) {
                if (!byId.has(e.source) || !byId.has(e.target)) continue;
                indeg.set(e.target, (indeg.get(e.target) || 0) + 1);
                out.get(e.source).push(e.target);
            }

            const nCount = nodes.length;
            const layer = new Map(nodes.map(n => [n.id, 0]));
            for (let i = 0; i < Math.max(1, nCount); i += 1) {
                let changed = false;
                for (const e of links) {
                    const a = layer.get(e.source) || 0;
                    const b = layer.get(e.target) || 0;
                    const cand = Math.min(nCount - 1, a + 1);
                    if (cand > b) {
                        layer.set(e.target, cand);
                        changed = true;
                    }
                }
                if (!changed) break;
            }

            const layers = new Map();
            let maxLayer = 0;
            for (const n of nodes) {
                const l = layer.get(n.id) || 0;
                maxLayer = Math.max(maxLayer, l);
                if (!layers.has(l)) layers.set(l, []);
                layers.get(l).push(n);
            }
            for (const arr of layers.values()) {
                arr.sort((a, b) => String(a.name).localeCompare(String(b.name), 'zh-CN'));
            }

            const positioned = [];
            const colCounts = [];
            for (let l = 0; l <= maxLayer; l += 1) {
                const arr = layers.get(l) || [];
                colCounts.push(arr.length);
                arr.forEach((n, idx) => {
                    positioned.push({
                        ...n,
                        _layer: l,
                        _row: idx,
                        x: LOGIC_CHAIN_LAYOUT.chainPadding + l * (LOGIC_CHAIN_LAYOUT.cardWidth + LOGIC_CHAIN_LAYOUT.colGap),
                        y: LOGIC_CHAIN_LAYOUT.chainPadding + idx * (LOGIC_CHAIN_LAYOUT.cardHeight + LOGIC_CHAIN_LAYOUT.rowGap),
                    });
                });
            }

            const width =
                LOGIC_CHAIN_LAYOUT.chainPadding * 2 +
                (maxLayer + 1) * LOGIC_CHAIN_LAYOUT.cardWidth +
                maxLayer * LOGIC_CHAIN_LAYOUT.colGap +
                (LOGIC_CHAIN_LAYOUT.chainRightPad || 0);

            const maxRows = Math.max(1, ...colCounts);
            const height =
                LOGIC_CHAIN_LAYOUT.chainPadding * 2 +
                maxRows * LOGIC_CHAIN_LAYOUT.cardHeight +
                Math.max(0, maxRows - 1) * LOGIC_CHAIN_LAYOUT.rowGap;

            const edgeLaneByKey = new Map();
            const laidOutLinks = links.map(e => {
                const key = `${e.source}__${e.target}`;
                const lane = edgeLaneByKey.has(key) ? edgeLaneByKey.get(key) : edgeLaneByKey.size % 3;
                if (!edgeLaneByKey.has(key)) edgeLaneByKey.set(key, lane);
                return { ...e, _lane: lane };
            });

            return { nodes: positioned, links: laidOutLinks, width, height };
        }


        function getL3WithL1Evidence() {
            if (!payload) return [];
            const codesById = new Map(payload.codes.map(c => [c.id, c]));
            const blocksById = new Map(payload.blocks.map(b => [b.id, b]));
            const children = new Map();
            for (const c of payload.codes) {
                const key = c.parentId || '__root__';
                if (!children.has(key)) children.set(key, []);
                children.get(key).push(c);
            }
            const l3List = payload.codes.filter(c => Number(c.level) === 3);
            return l3List.map(l3 => {
                const l2s = children.get(l3.id) || [];
                const l1s = l2s.flatMap(l2 => children.get(l2.id) || []).filter(c => Number(c.level) === 1);
                const evidence = l1s.map(l1 => ({
                    label: l1.name,
                    quotes: (l1.refs || []).slice(0, 3).map(r => blocksById.get(r.blockId)?.text).filter(Boolean),
                }));
                return { l3: l3.name, evidence };
            });
        }

        function buildTreeText() {
            if (!payload) return '';
            const byParent = new Map();
            for (const c of payload.codes) {
                const key = c.parentId || '__root__';
                if (!byParent.has(key)) byParent.set(key, []);
                byParent.get(key).push(c);
            }
            for (const arr of byParent.values()) {
                arr.sort((a, b) => Number(b.level) - Number(a.level));
            }
            const lines = [];
            function walk(parent, depth) {
                const list = byParent.get(parent) || [];
                for (const c of list) {
                    lines.push('  '.repeat(depth) + `- [L${c.level}] ${c.name} (${c.basisId || 'N/A'})`);
                    walk(c.id, depth + 1);
                }
            }
            walk('__root__', 0);
            return lines.join('\n');
        }

        function pulseBlockTwice(blockId) {
            const el = readerBlocks.querySelector('[data-block-id="' + attrSel(blockId) + '"]');
            if (!el) return;

        function buildBlockIndex() {
            blockToCodes = new Map();
            if (!payload) return;
            for (const c of payload.codes) {
                for (const r of c.refs) {
                    if (!blockToCodes.has(r.blockId)) blockToCodes.set(r.blockId, []);
                    const arr = blockToCodes.get(r.blockId);
                    if (!arr.includes(c.id)) arr.push(c.id);
                }
            }
        }

        function buildTreeIndex() {
            parentByCodeId = new Map();
            childrenByCodeId = new Map();
            if (!payload) return;
            for (const c of payload.codes) {
                const key = c.parentId || '__root__';
                if (!childrenByCodeId.has(key)) childrenByCodeId.set(key, []);
                childrenByCodeId.get(key).push(c);
                parentByCodeId.set(c.id, c.parentId || null);
            }
            for (const arr of childrenByCodeId.values()) {
                arr.sort((a, b) => (Number(b.level) - Number(a.level)) || a.id.localeCompare(b.id));
            }
        }

        function renderBlockBody(text, refs) {
            const whole = !refs.length || refs.some(r => r.start == null || r.end == null);
            if (whole) return escapeHtml(text);

            const sorted = refs.slice().sort((a, b) => a.start - b.start);
            let out = '';
            let i = 0;
            for (const r of sorted) {
                const s = Math.max(0, r.start);
                const e = Math.min(text.length, r.end);
                if (s > i) out += escapeHtml(text.slice(i, s));
                if (e > s) out += '<mark class="trace-mark">' + escapeHtml(text.slice(s, e)) + '</mark>';
                i = Math.max(i, e);
            }
            if (i < text.length) out += escapeHtml(text.slice(i));
            return out;
        }

        function renderReader() {

            if (!payload || !payload.blocks.length) {

                readerBlocks.classList.add('hidden');

        function renderCodeTree() {
            codeTree.innerHTML = '';
            if (!payload || !payload.codes.length) {
                codeTree.appendChild(codeTreeEmpty);
                codeTreeEmpty.style.display = 'block';
                return;
            }
            codeTreeEmpty.style.display = 'none';

            const roots = (childrenByCodeId.get('__root__') || []).filter(c => Number(c.level) === 3);
            const rootList = roots.length ? roots : (childrenByCodeId.get('__root__') || []);

            function makeNode(c) {
                const wrap = document.createElement('div');
                wrap.className = 'tree-node';

                const node = document.createElement('div');
                node.className = 'code-node';
                node.dataset.codeId = c.id;

                const children = childrenByCodeId.get(c.id) || [];
                const hasChildren = children.length > 0;
                const expanded = expandedTreeIds.has(c.id);
                const canExpand = hasChildren && (Number(c.level) === 3 || Number(c.level) === 2);

                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'code-hit';
                btn.innerHTML =
                    '<div class="code-meta">' +
                    '<span class="level-pill l' + c.level + '">L' + c.level + '</span>' +
                    (canExpand
                        ? '<span class="tree-toggle ' + (expanded ? 'is-expanded' : '') + '">▶</span>'
                        : '<span class="tree-toggle"></span>') +
                    '</div>' +
                    '<div class="code-name">' + escapeHtml(c.name) + '</div>' +
                    '<div class="code-refs">' + c.refs.length + ' 条原文锚点</div>';
                btn.addEventListener('click', () => {
                    if (canExpand) {
                        if (expandedTreeIds.has(c.id)) expandedTreeIds.delete(c.id);
                        else expandedTreeIds.add(c.id);
                    }
                    selectCode(c.id);
                });
                node.appendChild(btn);
                wrap.appendChild(node);

                if (hasChildren && expanded) {
                    const childBox = document.createElement('div');
                    childBox.className = 'tree-children';
                    for (const child of children) childBox.appendChild(makeNode(child));
                    wrap.appendChild(childBox);
                }
                return wrap;
            }

            for (const root of rootList) codeTree.appendChild(makeNode(root));
            syncSidebarActive();
        }

        function getRefsForBlock(codeId, blockId) {
            const code = payload.codes.find(x => x.id === codeId);
            if (!code) return [];
            return code.refs.filter(r => r.blockId === blockId);
        }

        function applyHighlights() {
            if (!payload) return;
            readerBlocks.querySelectorAll('.text-block').forEach(el => {
                const bid = el.dataset.blockId;
                const body = el.querySelector('.block-body');
                const tags = el.querySelector('.block-tags');
                const basisPanel = el.querySelector('.basis-panel');
                const block = payload.blocks.find(b => b.id === bid);
                if (!body || !block || !tags || !basisPanel) return;

                if (!activeCodeId) {
                    body.innerHTML = escapeHtml(block.text);
                    el.classList.remove('is-lit');
                    tags.innerHTML = '';
                    basisPanel.classList.add('hidden');
                    basisPanel.innerHTML = '';
                    return;
                }

                const refs = getRefsForBlock(activeCodeId, bid);
                const lit = refs.length > 0;
                el.classList.toggle('is-lit', lit);
                body.innerHTML = renderBlockBody(block.text, refs);

                if (!lit) {
                    tags.innerHTML = '';
                    basisPanel.classList.add('hidden');
                    basisPanel.innerHTML = '';
                    return;
                }

                const code = payload.codes.find(c => c.id === activeCodeId);
                if (!code) return;
                const key = `${bid}::${code.id}`;
                tags.innerHTML =
                    '<button type="button" class="code-badge" data-block-id="' + escapeHtml(bid) + '" data-code-id="' + escapeHtml(code.id) + '">' +
                    '编码：' + escapeHtml(code.name) + ' · 查看依据</button>';

                if (expandedBadgeKey === key) {
                    const basis = getBasisById(code.basisId);
                    const content = basis
                        ? (
                            '<div class="basis-title">学术依据 · ' + escapeHtml(basis.id) + '</div>' +
                            '<div><strong>规范主题：</strong>' + escapeHtml(basis.topic) + '</div>' +
                            '<div><strong>定义内容：</strong>' + escapeHtml(basis.definition) + '</div>' +
                            '<div><strong>方法论范式：</strong>' + escapeHtml(basis.paradigm) + '</div>'
                        )
                        : '<div class="basis-title">学术依据</div><div>未找到对应 basisId：' + escapeHtml(code.basisId || 'N/A') + '</div>';
                    basisPanel.innerHTML = content;
                    basisPanel.classList.remove('hidden');
                } else {
                    basisPanel.classList.add('hidden');
                    basisPanel.innerHTML = '';
                }
            });
        }

        function scrollToBlock(blockId) {
            const el = readerBlocks.querySelector('[data-block-id="' + attrSel(blockId) + '"]');
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function selectCode(codeId) {
            if (!payload) return;
            activeCodeId = codeId;
            let p = parentByCodeId.get(codeId);
            while (p) {
                expandedTreeIds.add(p);
                p = parentByCodeId.get(p);
            }
            expandedBadgeKey = null;
            renderCodeTree();
            applyHighlights();
            const code = payload.codes.find(c => c.id === codeId);
            if (code && code.refs[0]) {
                scrollToBlock(code.refs[0].blockId);
                if (Number(code.level) === 1) {
                    for (const ref of code.refs) {
                        pulseBlockTwice(ref.blockId);
                    }
                }
            }
        }

        async function runAnalyze() {
            const text = interviewText.value.trim();
            if (!text) {
                alert('请先粘贴访谈文本。');
                return;
            }
            setError('');
            setLoading(true);
            payload = null;
            activeCodeId = null;
            btnExportExcel.classList.remove('is-loading');
            btnSmartConnectGlobal.classList.remove('is-loading');
            btnGenerateMemo.classList.remove('is-loading');
            renderReader();
            renderCodeTree();

            try {
                await ensureAcademicBaseReady();
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text }),
                });
                let rawBody = await response.text();
                rawBody = rawBody.replace(/^\uFEFF/, '');
                let data;
                try {
                    data = rawBody ? JSON.parse(rawBody) : {};
                } catch {
                    const snippet = rawBody.replace(/\s+/g, ' ').trim().slice(0, 160);
                    const looksHtml = /^\s*</.test(rawBody);
                    const hint =
                        looksHtml || response.status === 404
                            ? '请关闭「仅静态文件」预览：在项目根目录执行 npx wrangler pages dev public，用终端里显示的地址（如 http://127.0.0.1:8788）打开页面，这样 /api/analyze 才会生效。'
                            : '请检查网络与部署；若本地开发务必使用 wrangler pages dev。';
                    throw new Error('接口返回的不是 JSON。' + hint + (snippet ? '原文片段：' + snippet : ''));
                }

                if (!response.ok) {
                    throw new Error(data.error || ('HTTP ' + response.status));
                }

                if (!data || typeof data !== 'object') {
                    throw new Error('接口返回无效数据');
                }
                if (data.error) {
                    throw new Error(data.error);
                }
                if (!Array.isArray(data.blocks) || !Array.isArray(data.codes)) {
                    throw new Error('接口未返回三级编码树结构');
                }

                payload = data;
                validatePayload(payload);
                buildBlockIndex();
                buildTreeIndex();
                expandedTreeIds = new Set();
                renderReader();
                renderCodeTree();
            } catch (err) {
                console.error(err);
                setError('分析失败：' + err.message);
                payload = null;
                isLogicCanvasVisible = false;
                if (logicCanvasSection) logicCanvasSection.classList.add('hidden');
                if (logicGraphCanvas) logicGraphCanvas.innerHTML = '';
                renderReader();
                renderCodeTree();
            } finally {
                setLoading(false);
            }
        }

        ensureAcademicBaseReady().catch(err => {
            console.error(err);
            setError('学术规范库加载失败：' + err.message);
        });
